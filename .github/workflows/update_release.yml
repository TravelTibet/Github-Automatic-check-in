name: Update README on Release

on:
  release:
    types: [published]

jobs:
  update-readme:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          token: ${{ secrets.DAILY_CHECKIN }}

      - name: Update README with release notes
        run: |
          python3 - << 'EOF'
          import json, re, os

          with open(os.environ['GITHUB_EVENT_PATH']) as f:
              event = json.load(f)

          release = event['release']
          tag  = release['tag_name']
          body = release['body'] or '无更新说明'
          url  = release['html_url']
          date = release['published_at'][:10]

          block = f"### [{tag}]({url}) · {date}\n\n{body}"

          with open('README.md', 'r', encoding='utf-8') as f:
              content = f.read()

          new_content = re.sub(
              r'<!-- RELEASE_START -->.*?<!-- RELEASE_END -->',
              f'<!-- RELEASE_START -->\n{block}\n<!-- RELEASE_END -->',
              content,
              flags=re.DOTALL
          )

          with open('README.md', 'w', encoding='utf-8') as f:
              f.write(new_content)

          print(f"✅ README updated for {tag}")
          EOF

      - name: Commit and push
        run: |
          git config --global user.name "xiname"
          git config --global user.email "119091203+TravelTibet@users.noreply.github.com"
          git add README.md
          git commit -m "docs: update README for ${{ github.event.release.tag_name }}" || echo "nothing to commit"
          git push
